name: Gerar IPA para iPhone

on:
  workflow_dispatch:

jobs:
  gerar-ipa:
    runs-on: macos-26-intel
    timeout-minutes: 60

    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Selecionar Xcode
        run: |
          sudo xcode-select \
            --switch /Applications/Xcode_26.6.app/Contents/Developer

          echo "Xcode:"
          xcodebuild -version

          echo "SDK iOS:"
          xcrun --sdk iphoneos --show-sdk-version

          echo "Arquitetura:"
          uname -m

      - name: Restaurar cache do CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-${{ runner.arch }}-pods-${{ hashFiles('package-lock.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pods-

      - name: Instalar dependências
        run: npm ci

      - name: Verificar configuração do Expo
        run: |
          npx expo config --type public
          npx expo-doctor || true

      - name: Gerar projeto nativo iOS
        run: |
          npx expo prebuild \
            --platform ios \
            --clean \
            --no-install

      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install

      - name: Identificar workspace e scheme
        id: ios-project
        shell: bash
        run: |
          set -e

          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' -print -quit)"

          if [ -z "$WORKSPACE" ]; then
            echo "Nenhum workspace encontrado."
            find ios -maxdepth 2 -type f | sort
            exit 1
          fi

          SCHEME="$(basename "$WORKSPACE" .xcworkspace)"

          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -list

      - name: Compilar aplicativo para iPhone
        timeout-minutes: 50
        shell: bash
        run: |
          set -e
          set -o pipefail

          WORKSPACE="${{ steps.ios-project.outputs.workspace }}"
          SCHEME="${{ steps.ios-project.outputs.scheme }}"

          echo "Iniciando compilação:"
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build" \
            -parallelizeTargets \
            -jobs 4 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            2>&1 | tee xcodebuild.log

      - name: Encontrar aplicativo compilado
        id: compiled-app
        shell: bash
        run: |
          set -e

          APP_PATH="$(
            find build/Build/Products/Release-iphoneos \
              -maxdepth 1 \
              -name '*.app' \
              -print \
              -quit
          )"

          if [ -z "$APP_PATH" ]; then
            echo "O arquivo .app não foi encontrado."

            find build \
              -maxdepth 8 \
              -type d \
              -name '*.app' \
              -print || true

            exit 1
          fi

          APP_NAME="$(basename "$APP_PATH" .app)"

          echo "Aplicativo: $APP_PATH"
          echo "Nome: $APP_NAME"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Empacotar IPA
        shell: bash
        run: |
          set -e

          APP_PATH="${{ steps.compiled-app.outputs.app_path }}"
          APP_NAME="${{ steps.compiled-app.outputs.app_name }}"

          rm -rf ipa-package
          mkdir -p ipa-package/Payload

          cp -R "$APP_PATH" ipa-package/Payload/

          cd ipa-package

          ditto \
            -c \
            -k \
            --sequesterRsrc \
            --keepParent \
            Payload \
            "../${APP_NAME}-unsigned.ipa"

          cd ..

          echo "IPA criado:"
          ls -lh "${APP_NAME}-unsigned.ipa"

      - name: Enviar IPA para download
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Gym-iOS-unsigned
          path: "*-unsigned.ipa"
          if-no-files-found: error
          retention-days: 7

      - name: Enviar log da compilação
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Gym-iOS-build-log
          path: xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7
